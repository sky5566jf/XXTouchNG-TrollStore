name: Build XXTouchNG TrollStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup environment
      run: |
        brew install ldid libtool autoconf automake
        
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        cd $THEOS/sdks
        curl -L -o sdks.tar.gz https://github.com/theos/sdks/archive/refs/heads/master.tar.gz
        tar xzf sdks.tar.gz
        cp -R sdks-master/* . 2>/dev/null || true
        rm -rf sdks-master sdks.tar.gz
        
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Build with theos
      run: |
        export THEOS=~/theos
        export FINALPACKAGE=1
        export TARGET_CODESIGN=ldid
        
        # Fix permissions
        find . -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
        chmod +x $THEOS/bin/* 2>/dev/null || true
        
        # Create a working tbdump stub
        cat > $THEOS/bin/tbdump << 'TBEOF'
#!/bin/sh
exit 0
TBEOF
        chmod +x $THEOS/bin/tbdump
        
        # Patch liblua to skip after-all step
        sed -i '' 's/^after-all::/#after-all::/' liblua/Makefile 2>/dev/null || true
        
        # Build
        make clean 2>/dev/null || true
        make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu) 2>&1 | tee build.log || true
        
        echo "=== Built binaries ==="
        find . -name "*.dylib" -path "*/layout/*" -size +100k -exec ls -la {} \;
        
    - name: Package as tipa
      run: |
        mkdir -p Payload/XXTouchNG.app
        mkdir -p Payload/XXTouchNG.app/lib
        mkdir -p Payload/XXTouchNG.app/bin
        
        # Copy real binaries only
        find . -name "*.dylib" -path "*/layout/*" -size +1024c -exec cp {} Payload/XXTouchNG.app/lib/ \; 2>/dev/null || true
        find . -name "*.so" -path "*/layout/*" -size +1024c -exec cp {} Payload/XXTouchNG.app/lib/ \; 2>/dev/null || true
        find . -type f -executable -path "*/layout/usr/local/xxtouch/bin/*" -size +1024c -exec cp {} Payload/XXTouchNG.app/bin/ \; 2>/dev/null || true
        
        # Copy resources
        for dir in ext/layout/usr/local/xxtouch webserv/layout/usr/local/xxtouch; do
          if [ -d "$dir" ]; then
            cp -R $dir/* Payload/XXTouchNG.app/ 2>/dev/null || true
          fi
        done
        
        # Create Info.plist
        cat > Payload/XXTouchNG.app/Info.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleDisplayName</key>
    <string>XXTouchNG</string>
    <key>CFBundleExecutable</key>
    <string>webserv</string>
    <key>CFBundleIdentifier</key>
    <string>ch.xxtou.xxtouchng</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleShortVersionString</key>
    <string>3.0.1</string>
    <key>MinimumOSVersion</key>
    <string>14.0</string>
</dict>
</plist>
PLIST
        
        # Create entitlements
        cat > Payload/XXTouchNG.app/ent.plist << 'ENT'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>platform-application</key><true/>
    <key>get-task-allow</key><true/>
    <key>task_for_pid-allow</key><true/>
    <key>proc_info-allow</key><true/>
    <key>run-unsigned-code</key><true/>
    <key>com.apple.private.security.no-sandbox</key><true/>
    <key>com.apple.private.security.no-container</key><true/>
    <key>com.apple.private.skip-library-validation</key><true/>
    <key>com.apple.private.kernel.jetsam</key><true/>
    <key>com.apple.private.hid.manager.client</key><true/>
    <key>com.apple.private.hid.client.event-dispatch</key><true/>
    <key>com.apple.private.hid.client.event-monitor</key><true/>
    <key>com.apple.private.IOSurface.protected-access</key><true/>
    <key>com.apple.security.iokit-user-client-class</key>
    <array>
        <string>IOSurfaceRootUserClient</string>
        <string>IOMobileFramebufferUserClient</string>
        <string>IOSurfaceAcceleratorClient</string>
        <string>IOHIDLibUserClient</string>
    </array>
</dict>
</plist>
ENT
        
        # Sign if we have a binary
        if [ -f "Payload/XXTouchNG.app/webserv" ]; then
          cd Payload/XXTouchNG.app
          ldid -Sent.plist webserv 2>/dev/null || true
          cd ../..
        fi
        
        # Create tipa
        zip -r XXTouchNG.tipa Payload/
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXTouchNG-TrollStore
        path: Payload/
        if-no-files-found: warn
