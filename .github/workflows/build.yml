name: Build XXTouchNG TrollStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup environment
      run: |
        brew install ldid libtool autoconf automake
        
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # Download iOS SDKs
        cd $THEOS/sdks
        curl -L -o sdks.tar.gz https://github.com/theos/sdks/archive/refs/heads/master.tar.gz
        tar xzf sdks.tar.gz
        cp -R sdks-master/* . 2>/dev/null || true
        rm -rf sdks-master sdks.tar.gz
        
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Build with theos
      run: |
        export THEOS=~/theos
        export FINALPACKAGE=1
        export TARGET_CODESIGN=ldid
        
        # Fix permissions
        chmod +x liblua/tbdump.sh 2>/dev/null || true
        find . -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true
        
        # Use the root Makefile to build all subprojects
        make clean 2>/dev/null || true
        make package FINALPACKAGE=1 -j$(sysctl -n hw.ncpu) 2>&1 | tee build.log || true
        
        # Check if build produced any real binaries
        echo "=== Built binaries ==="
        find . -name "*.dylib" -path "*/layout/*" -size +100k -exec ls -la {} \;
        
    - name: Check build output
      run: |
        export THEOS=~/theos
        echo "=== Checking layout directories ==="
        find . -name "*.dylib" -path "*/layout/*" | while read f; do
          size=$(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null)
          echo "$f: $size bytes"
        done | head -30
        
    - name: Package as tipa
      run: |
        mkdir -p Payload/XXTouchNG.app
        mkdir -p Payload/XXTouchNG.app/lib
        mkdir -p Payload/XXTouchNG.app/bin
        
        # Copy ONLY real binaries (skip stubs < 1KB)
        find . -name "*.dylib" -path "*/layout/*" -size +1024c -exec cp {} Payload/XXTouchNG.app/lib/ \; 2>/dev/null || true
        find . -name "*.so" -path "*/layout/*" -size +1024c -exec cp {} Payload/XXTouchNG.app/lib/ \; 2>/dev/null || true
        
        # Copy CLI tools
        find . -type f -executable -path "*/layout/usr/local/xxtouch/bin/*" -size +1024c -exec cp {} Payload/XXTouchNG.app/bin/ \; 2>/dev/null || true
        
        # Copy resources
        for dir in ext/layout/usr/local/xxtouch webserv/layout/usr/local/xxtouch; do
          if [ -d "$dir" ]; then
            cp -R $dir/* Payload/XXTouchNG.app/ 2>/dev/null || true
          fi
        done
        
        # Check if we have a real binary
        echo "=== Final app contents ==="
        find Payload/XXTouchNG.app -type f -size +1024c | head -20
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXTouchNG-TrollStore
        path: Payload/
        if-no-files-found: warn
