name: Build XXTouchNG TrollStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup environment
      run: |
        # Install dependencies
        brew install ldid libtool autoconf automake
        
        # Install theos
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        
        # Download iOS 14.5 SDK for theos
        mkdir -p $THEOS/sdks
        curl -L -o $THEOS/sdks/iPhoneOS14.5.sdk.tar.gz https://github.com/theos/sdks/archive/master.tar.gz
        cd $THEOS/sdks
        tar xzf master.tar.gz
        mv sdks-master/iPhoneOS14.5.sdk . 2>/dev/null || mv sdks-master/* . 2>/dev/null || true
        rm -rf sdks-master master.tar.gz
        
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Verify SDK
      run: |
        export THEOS=~/theos
        echo "SDK path: $THEOS/sdks/"
        ls -la $THEOS/sdks/ 2>/dev/null || echo "No SDKs found"
        
    - name: Build core modules
      run: |
        export THEOS=~/theos
        export FINALPACKAGE=1
        export TARGET_CODESIGN=ldid
        
        make clean 2>/dev/null || true
        
        # Build each module
        for module in liblua auth debug core ext exstring file memory pasteboard samba alert app cookies touch screen device proc supervisor hid webserv; do
          echo "=== Building $module ==="
          cd $module
          make FINALPACKAGE=1 -j$(sysctl -n hw.ncpu) 2>&1 | tail -10
          if [ $? -ne 0 ]; then
            echo "Warning: $module had build errors"
          fi
          cd ..
        done
        
    - name: Package as tipa
      run: |
        mkdir -p Payload/XXTouchNG.app
        mkdir -p Payload/XXTouchNG.app/lib
        mkdir -p Payload/XXTouchNG.app/bin
        mkdir -p Payload/XXTouchNG.app/lib/xxtouch
        
        # Copy built dylibs
        find . -name "*.dylib" -path "*/layout/*" -exec cp {} Payload/XXTouchNG.app/lib/ \; 2>/dev/null || true
        find . -name "*.so" -path "*/layout/*" -exec cp {} Payload/XXTouchNG.app/lib/xxtouch/ \; 2>/dev/null || true
        
        # Copy CLI tools
        find . -type f -executable -path "*/layout/usr/local/xxtouch/bin/*" -exec cp {} Payload/XXTouchNG.app/bin/ \; 2>/dev/null || true
        
        # Copy Lua scripts and resources
        for dir in ext/layout/usr/local/xxtouch webserv/layout/usr/local/xxtouch; do
          if [ -d "$dir" ]; then
            cp -R $dir/* Payload/XXTouchNG.app/ 2>/dev/null || true
          fi
        done
        
        # Create Info.plist
        cat > Payload/XXTouchNG.app/Info.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDisplayName</key>
            <string>XXTouchNG</string>
            <key>CFBundleExecutable</key>
            <string>webserv</string>
            <key>CFBundleIdentifier</key>
            <string>ch.xxtou.xxtouchng</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>3.0.1</string>
            <key>MinimumOSVersion</key>
            <string>14.0</string>
        </dict>
        </plist>
        PLIST
        
        # Create entitlements
        cat > Payload/XXTouchNG.app/ent.plist << 'ENT'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>platform-application</key><true/>
            <key>get-task-allow</key><true/>
            <key>task_for_pid-allow</key><true/>
            <key>proc_info-allow</key><true/>
            <key>run-unsigned-code</key><true/>
            <key>com.apple.private.security.no-sandbox</key><true/>
            <key>com.apple.private.security.no-container</key><true/>
            <key>com.apple.private.skip-library-validation</key><true/>
            <key>com.apple.private.kernel.jetsam</key><true/>
            <key>com.apple.private.hid.manager.client</key><true/>
            <key>com.apple.private.hid.client.event-dispatch</key><true/>
            <key>com.apple.private.hid.client.event-monitor</key><true/>
            <key>com.apple.private.IOSurface.protected-access</key><true/>
            <key>com.apple.security.iokit-user-client-class</key>
            <array>
                <string>IOSurfaceRootUserClient</string>
                <string>IOMobileFramebufferUserClient</string>
                <string>IOSurfaceAcceleratorClient</string>
                <string>IOHIDLibUserClient</string>
            </array>
        </dict>
        </plist>
        ENT
        
        # Sign the main executable
        cd Payload/XXTouchNG.app
        ldid -Sent.plist webserv 2>/dev/null || true
        cd ../..
        
        # Create tipa (zip)
        zip -r XXTouchNG.tipa Payload/
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: XXTouchNG-TrollStore
        path: XXTouchNG.tipa
